{{- range .Values.sccs }}
{{- $scc := . }}
{{- range .serviceAccounts }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "scc.roleBindingName" (dict "Release" $.Release "sccName" $scc.name "saName" .name) }}
  namespace: {{ .namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "scc.clusterRoleName" (dict "Release" $.Release "sccName" $scc.name) }}
subjects:
- kind: ServiceAccount
  name: {{ .name }}
  namespace: {{ .namespace }}
{{- end }}
{{- end }}
