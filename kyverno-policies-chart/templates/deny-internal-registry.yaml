{{- if .Values.policies.denyInternalRegistry.enabled }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: deny-internal-registry
  annotations:
    policies.kyverno.io/title: Deny Internal Registry
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Blocks Deployments from using the internal OpenShift container registry.
      All images must be pulled from an external container registry.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: deny-internal-registry-containers
      match:
        any:
          - resources:
              kinds:
                - Deployment
              operations:
                - CREATE
                - UPDATE
      exclude:
        any:
          - resources:
              namespaces:
              {{- range .Values.policies.excludeNamespaces.exact }}
                - {{ . | quote }}
              {{- end }}
              {{- range .Values.policies.excludeNamespaces.wildcards }}
                - {{ . | quote }}
              {{- end }}
      preconditions:
        all:
          - key: "{{`{{ request.object.spec.template.metadata.annotations.\"not.suppurted.image.registry\" || '' }}`}}"
            operator: NotEquals
            value: "true"
      validate:
        message: >-
          Container images must not reference the internal OpenShift registry
          (image-registry.openshift-image-registry.svc or docker-registry.default.svc).
          Use an external container registry instead.
        foreach:
          - list: "request.object.spec.template.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{`{{ element.image }}`}}"
                    operator: AnyIn
                    value:
                      - "image-registry.openshift-image-registry.svc*"
                      - "docker-registry.default.svc*"
    - name: deny-internal-registry-init-containers
      match:
        any:
          - resources:
              kinds:
                - Deployment
              operations:
                - CREATE
                - UPDATE
      exclude:
        any:
          - resources:
              namespaces:
              {{- range .Values.policies.excludeNamespaces.exact }}
                - {{ . | quote }}
              {{- end }}
              {{- range .Values.policies.excludeNamespaces.wildcards }}
                - {{ . | quote }}
              {{- end }}
      preconditions:
        all:
          - key: "{{`{{ request.object.spec.template.metadata.annotations.\"not.suppurted.image.registry\" || '' }}`}}"
            operator: NotEquals
            value: "true"
          # Only evaluate if initContainers exist
          - key: "{{`{{ request.object.spec.template.spec.initContainers[] || '' }}`}}"
            operator: NotEquals
            value: ""
      validate:
        message: >-
          Init container images must not reference the internal OpenShift registry.
          Use an external container registry instead.
        foreach:
          - list: "request.object.spec.template.spec.initContainers"
            deny:
              conditions:
                any:
                  - key: "{{`{{ element.image }}`}}"
                    operator: AnyIn
                    value:
                      - "image-registry.openshift-image-registry.svc*"
                      - "docker-registry.default.svc*"
{{- end }}
