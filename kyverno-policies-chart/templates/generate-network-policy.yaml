{{- if .Values.policies.generateNetworkPolicy.enabled }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: generate-default-network-policy
  annotations:
    policies.kyverno.io/title: Generate Default Network Policy
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Generates a default-deny NetworkPolicy with allowed infrastructure
      traffic in every new namespace. Provides defense-in-depth alongside
      the ClusterNetworkPolicy.
spec:
  background: false
  rules:
    - name: generate-default-network-policy
      match:
        any:
          - resources:
              kinds:
                - Namespace
              operations:
                - CREATE
      exclude:
        any:
          - resources:
              names:
              {{- range .Values.policies.excludeNamespaces.exact }}
                - {{ . | quote }}
              {{- end }}
              {{- range .Values.policies.excludeNamespaces.wildcards }}
                - {{ . | quote }}
              {{- end }}
                - "default"
      generate:
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        name: default-deny-with-infra
        namespace: "{{`{{ request.object.metadata.name }}`}}"
        synchronize: false
        data:
          spec:
            podSelector: {}
            policyTypes:
              - Ingress
              - Egress
            ingress:
              # Allow OpenShift Ingress (Router) traffic
              - from:
                  - namespaceSelector:
                      matchLabels:
                        network.openshift.io/policy-group: ingress
              # Allow OpenShift Monitoring (Prometheus) scraping
              - from:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: openshift-monitoring
                ports:
                  - protocol: TCP
                    port: 8080
                  - protocol: TCP
                    port: 8443
                  - protocol: TCP
                    port: 9090
                  - protocol: TCP
                    port: 9091
              # Allow intra-namespace communication
              - from:
                  - podSelector: {}
            egress:
              # DNS resolution
              - to:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: openshift-dns
                ports:
                  - protocol: UDP
                    port: 53
                  - protocol: TCP
                    port: 53
              # NFS storage access
              - to:
                  - ipBlock:
                      cidr: {{ .Values.policies.generateNetworkPolicy.nfsSubnet | quote }}
                ports:
                  - protocol: TCP
                    port: 2049
                  - protocol: UDP
                    port: 2049
                  - protocol: TCP
                    port: 111
                  - protocol: UDP
                    port: 111
                  - protocol: TCP
                    port: 8000
                  - protocol: TCP
                    port: 635
                  - protocol: UDP
                    port: 635
              # OpenShift API Server
              - to:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: openshift-apiserver
                ports:
                  - protocol: TCP
                    port: 6443
              # Kubernetes API Server
              - to:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: openshift-kube-apiserver
                ports:
                  - protocol: TCP
                    port: 6443
              # Image Registry
              - to:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: openshift-image-registry
                ports:
                  - protocol: TCP
                    port: 5000
              # Intra-namespace communication
              - to:
                  - podSelector: {}
{{- end }}
