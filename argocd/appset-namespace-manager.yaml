apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: namespace-manager
  namespace: argocd
spec:
  generators:
  - git:
      repoURL: <REPO_URL>        # e.g. https://github.com/org/sks.git
      revision: HEAD
      directories:
      - path: sites/*/*            # matches sites/<site>/<cluster>
  template:
    metadata:
      name: "namespace-manager-{{path[1]}}-{{path.basename}}"
    spec:
      project: default
      source:
        repoURL: <REPO_URL>
        targetRevision: HEAD
        path: namespace-chart
        helm:
          valueFiles:
          - ../sites/{{path[1]}}/namespace-manager.yaml       # site-level shared values
          - ../{{path}}/namespace-manager.yaml                # cluster-specific overrides
      destination:
        name: "{{path.basename}}"   # must match ArgoCD registered cluster name
        namespace: argocd           # ArgoCD app lives here; chart deploys to its own ns
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
