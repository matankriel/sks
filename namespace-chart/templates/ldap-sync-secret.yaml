{{- if not .Values.ldap.existingBindPasswordSecret.name }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ldapBindPasswordSecretName" . }}
  namespace: {{ .Values.namespace.name }}
type: Opaque
stringData:
  {{ include "ldapBindPasswordSecretKey" . }}: {{ required "ldap.bindPassword is required when not using existingBindPasswordSecret" .Values.ldap.bindPassword | quote }}
{{- end }}
